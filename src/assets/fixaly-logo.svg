<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 135" fill="none">
  <style>
    .txt {
      font-family: 'Arial Black', 'Arial Bold', 'Helvetica Neue', Impact, sans-serif;
      font-weight: 900;
      font-size: 118px;
      fill: #111111;
      letter-spacing: -2px;
    }
  </style>

  <!-- "Fix" -->
